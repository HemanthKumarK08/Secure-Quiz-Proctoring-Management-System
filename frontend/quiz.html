<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Platform</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --option-bg: #e9e9e9; /* Matches your screenshot */
      --option-hover: #dedede;
      --text-dark: #1e293b;
    }

    body {
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: var(--text-dark);
    }

    .quiz-box {
      width: 100%;
      max-width: 800px;
      background: var(--card-bg);
      margin: 20px;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    /* Top Bar Styling */
    .top {
      background: var(--primary-gradient);
      color: white;
      padding: 18px 25px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
      margin-bottom: 30px;
    }

    #timer {
      background: rgba(255, 255, 255, 0.2);
      padding: 4px 12px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
    }

    /* Question Box Area */
    .question {
      margin-top: 10px;
      padding: 10px 0;
      min-height: 220px;
    }

    #questionBox h4 {
      font-weight: 700;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    /* The Pill-Shaped Options (as per your screenshot) */
    .option-item {
      display: block;
      width: 100%;
      padding: 16px 25px;
      margin-bottom: 12px;
      background-color: var(--option-bg);
      border: none;
      border-radius: 12px;
      text-align: left;
      font-size: 1.1rem;
      font-weight: 500;
      color: #000;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
    }

    .option-item:hover {
      background-color: var(--option-hover);
      transform: translateX(5px);
    }

    /* Active/Selected State (optional JS toggle) */
    .option-item.active {
      background: var(--primary-gradient);
      color: white;
    }

    /* Buttons Styling */
    .controls {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-secondary {
      background-color: #f1f5f9;
      color: #64748b;
      border: none;
    }

    .btn-secondary:hover {
      background-color: #e2e8f0;
      color: #1e293b;
    }

    .btn-dark {
      background-color: #1e293b;
    }

    .btn-danger {
      background: #ef4444;
      border: none;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }

    #violationMsg {
      font-size: 0.9rem;
      text-align: center;
      background: #fef2f2;
      padding: 10px;
      border-radius: 10px;
      border-left: 4px solid #ef4444;
    }

    /* Disable text selection for security */
    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
  </style>
</head>

<body oncontextmenu="return false;">
/*<video id="camera" width="200" height="150" autoplay muted style="position:fixed; bottom:10px; right:10px; border-radius:10px;"></video>*/
<div class="quiz-box">

  <div class="top">
    <div id="quizTitle">General Assessment</div>
    <div>⏱ <span id="timer">00:00</span></div>
  </div>

  <div class="progress mb-4" style="height: 6px; background: #f1f5f9; border-radius: 10px;">
    <div class="progress-bar" style="width: 20%; background: var(--primary-gradient); border-radius: 10px;"></div>
  </div>

  <div id="questionBox" class="question">
    </div>

  <div class="controls">
    <div>
      <button class="btn btn-secondary me-2" id="prevBtn">Previous</button>
      <button class="btn btn-secondary" id="nextBtn">Next</button>
    </div>

    <div>
      <button class="btn btn-dark me-2" id="dashboardBtn">Dashboard</button>
      <button class="btn btn-danger" id="submitBtn">Submit Quiz</button>
    </div>
  </div>

  <div id="violationMsg" class="text-danger mt-4 fw-bold"></div>

</div>

<script src="js/quiz.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
</body>
</html>
