<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quiz Result</title>

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .result-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 700px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h3 {
      font-weight: 600;
      margin-bottom: 25px;
    }

    .stat {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .chart-box {
      margin: 30px 0;
      height: 300px;
    }

    .message-box {
      margin-top: 20px;
      padding: 15px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
    }

    .msg-success {
      background: #e6f4ea;
      color: #1e7e34;
    }

    .msg-warning {
      background: #fff3cd;
      color: #856404;
    }

    .msg-danger {
      background: #f8d7da;
      color: #842029;
    }

    .btn-dashboard {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      padding: 12px 22px;
      color: #fff;
      font-weight: 500;
      font-size: 16px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn-dashboard:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      color: #fff;
    }
  </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="result-card text-center">

    <h3>📊 Quiz Result</h3>

    <p class="stat">Score: <strong><span id="score"></span></strong></p>
    <p class="stat">
      Correct: <strong><span id="correct"></span></strong> |
      Wrong: <strong><span id="wrong"></span></strong>
    </p>
    <p class="stat">
      Accuracy: <strong><span id="accuracy"></span>%</strong>
    </p>

    <div class="chart-box">
      <canvas id="performanceChart"></canvas>
    </div>

    <!-- ✅ RESULT MESSAGE -->
    <div id="resultMessage" class="message-box"></div>

    <!-- ✅ SAFE BACK BUTTON -->
    <a href="student-dashboard.html" class="btn-dashboard mt-4">
      ⬅ Back to Dashboard
    </a>

  </div>
</div>

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/result.js"></script>

<script>
  // =========================
  // RESULT MESSAGE LOGIC
  // =========================
  const lastResult = JSON.parse(localStorage.getItem("lastResult") || "{}");

const score = lastResult.score ?? 0;
const total = lastResult.total ?? 0;
const status = lastResult.status ?? "submitted";
const avg = total / 2;

const msgBox = document.getElementById("resultMessage");

if (status === "auto_submitted") {
  msgBox.className = "message-box msg-danger";
  msgBox.innerHTML =
    "🚨 <strong>Exam Auto-Submitted!</strong><br>" +
    "Malpractice detected. Please attend exams honestly next time.";
} else if (score >= avg) {
  msgBox.className = "message-box msg-success";
  msgBox.innerHTML =
    "🎉 <strong>Excellent!</strong><br>You scored above average. Keep it up!";
} else {
  msgBox.className = "message-box msg-warning";
  msgBox.innerHTML =
    "💪 <strong>Better Luck Next Time!</strong><br>Practice more and improve.";
}

</script>

</body>
</html>
