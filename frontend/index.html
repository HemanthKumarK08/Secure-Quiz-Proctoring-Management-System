<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card h4 {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .login-card p {
      font-size: 14px;
      color: #666;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #667eea;
    }

    .btn-login {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .signup-link a {
      text-decoration: none;
      font-weight: 500;
      color: #667eea;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .quiz-marquee-container {
    
    overflow: hidden;
    white-space: nowrap;
    padding: 15px 0;
  }

  .quiz-marquee-text {
    display: inline-block;
    padding-left: 100%;
    animation: marquee 15s linear infinite;
    
    /* Font Enhancements */
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 24px; /* Increased size */
    font-weight: 600;
    color: beige;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  @keyframes marquee {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
  }
  </style>
</head>

<body>
<!-- <marquee behavior="scroll" direction="left" style=" color: white; padding: 10px 0;">
  Welcome to the Quiz Lock System - Secure Your Exams with Confidence!
</marquee> -->

<div class="quiz-marquee-container">
  <div class="quiz-marquee-text">
    Welcome to Secure Quiz & Proctoring Management System - Secure Your Exams with Confidence!
  </div>
</div>


<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="login-card col-11 col-sm-8 col-md-5 col-lg-4">

    <div class="text-center mb-4">
      <h4>Welcome Back 👋</h4>
      <p>Login to continue to the Quiz Lock System</p>
    </div>

    <div class="mb-3">
      <input type="email" id="email" class="form-control" placeholder="Email address">
    </div>

    <div class="mb-3">
      <input type="password" id="password" class="form-control" placeholder="Password">
    </div>

    <button id="loginBtn" class="btn btn-login text-white w-100 mb-3">
      Login
    </button>

    <div class="text-center signup-link">
      New user?
      <a href="register.html">Create an account</a>
    </div>

  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
