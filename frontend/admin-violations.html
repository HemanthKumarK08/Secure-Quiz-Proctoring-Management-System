<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exam Malpractice Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f4f6fb; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #e74a3b, #f6c23e); color: white; padding: 20px 25px; border-radius: 15px; margin-bottom: 20px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    .table thead { background: #e74a3b; color: white; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="header d-flex justify-content-between align-items-center">
    <h2>🚨 Exam Malpractice Report</h2>
    <button class="btn btn-light btn-sm" onclick="adminLogout()">Logout</button>
  </div>

  <ul class="nav nav-pills mb-4" id="adminNav"></ul>

  <div class="card mb-4">
    <div class="card-body">
      <h5>Filter Violations</h5>
      <div class="row g-3">
        <div class="col-md-3"><input id="filterStudent" class="form-control" placeholder="Student name"></div>
        <div class="col-md-3"><input id="filterQuiz" class="form-control" placeholder="Quiz title"></div>
        <div class="col-md-3"><input id="filterType" class="form-control" placeholder="Violation type (e.g. PROCTOR)"></div>
        <div class="col-md-3"><button class="btn btn-danger w-100" onclick="loadViolationReport()">Apply Filter</button></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body table-responsive">
      <table class="table table-bordered align-middle">
        <thead>
          <tr>
            <th>Student</th><th>Quiz</th><th>Violation Type</th><th>Time</th><th>Details</th>
          </tr>
        </thead>
        <tbody id="violationsBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="js/admin-common.js"></script>
<script src="js/admin-violations.js"></script>
</body>
</html>
