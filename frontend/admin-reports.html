<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Performance Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f4f6fb; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #4e73df, #1cc88a); color: white; padding: 20px 25px; border-radius: 15px; margin-bottom: 20px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    .table thead { background: #4e73df; color: white; }
    .nav-pills .nav-link.active { background: #4e73df; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="header d-flex justify-content-between align-items-center">
    <h2>📊 Student Performance Report</h2>
    <button class="btn btn-light btn-sm" onclick="adminLogout()">Logout</button>
  </div>

  <ul class="nav nav-pills mb-4" id="adminNav"></ul>

  <div class="card mb-4">
    <div class="card-body">
      <h5>Filter Report</h5>
      <div class="row g-3">
        <div class="col-md-3"><input id="filterStudent" class="form-control" placeholder="Student name"></div>
        <div class="col-md-3"><input id="filterQuiz" class="form-control" placeholder="Quiz title"></div>
        <div class="col-md-3"><input id="filterDate" type="date" class="form-control"></div>
        <div class="col-md-3"><button class="btn btn-primary w-100" onclick="loadPerformanceReport()">Apply Filter</button></div>
      </div>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-body table-responsive">
      <table class="table table-bordered align-middle">
        <thead>
          <tr>
            <th>Student</th><th>Quiz</th><th>Score</th><th>Attempt Date</th><th>Pass/Fail</th><th>Rank</th>
          </tr>
        </thead>
        <tbody id="performanceBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <h5>Search & Filter</h5>
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <select id="searchType" class="form-select">
            <option value="students">Students by name</option>
            <option value="quizzes">Quizzes by title</option>
            <option value="attempts">Attempts by date</option>
            <option value="violations">Violations by type</option>
          </select>
        </div>
        <div class="col-md-3"><input id="searchQuery" class="form-control" placeholder="Search text"></div>
        <div class="col-md-3" id="searchDateWrap"><input id="searchDate" type="date" class="form-control"></div>
        <div class="col-md-3"><button class="btn btn-success w-100" onclick="runSearch()">Search DB</button></div>
      </div>
      <div class="table-responsive">
        <table class="table table-bordered">
          <thead id="searchHead"></thead>
          <tbody id="searchBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="js/admin-common.js"></script>
<script src="js/admin-reports.js"></script>
</body>
</html>
