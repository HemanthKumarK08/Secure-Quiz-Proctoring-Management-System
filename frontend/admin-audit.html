<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audit Log</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f4f6fb; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #36b9cc, #4e73df); color: white; padding: 20px 25px; border-radius: 15px; margin-bottom: 20px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    .table thead { background: #36b9cc; color: white; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="header d-flex justify-content-between align-items-center">
    <h2>📋 Quiz History / Audit Log</h2>
    <button class="btn btn-light btn-sm" onclick="adminLogout()">Logout</button>
  </div>

  <ul class="nav nav-pills mb-4" id="adminNav"></ul>

  <div class="card">
    <div class="card-body table-responsive">
      <p class="text-muted">Tracks: Quiz created, Quiz deleted, Student login, Quiz started, Quiz submitted</p>
      <table class="table table-bordered align-middle">
        <thead>
          <tr>
            <th>User</th><th>Action</th><th>Module</th><th>Details</th><th>Time</th>
          </tr>
        </thead>
        <tbody id="auditBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="js/admin-common.js"></script>
<script src="js/admin-audit.js"></script>
</body>
</html>
