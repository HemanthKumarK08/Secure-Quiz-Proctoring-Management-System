<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leaderboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f4f6fb; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #f6c23e, #1cc88a); color: white; padding: 20px 25px; border-radius: 15px; margin-bottom: 20px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    .table thead { background: #1cc88a; color: white; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="header d-flex justify-content-between align-items-center">
    <h2>🏆 Ranking / Leaderboard</h2>
    <button class="btn btn-light btn-sm" onclick="adminLogout()">Logout</button>
  </div>

  <ul class="nav nav-pills mb-4" id="adminNav"></ul>

  <div class="row g-4">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body table-responsive">
          <h5>Top Scorers</h5>
          <table class="table table-bordered align-middle">
            <thead><tr><th>Rank</th><th>Student</th><th>Total Score</th><th>Quizzes Taken</th></tr></thead>
            <tbody id="topScorersBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card">
        <div class="card-body table-responsive">
          <h5>Most Active Students</h5>
          <table class="table table-bordered align-middle">
            <thead><tr><th>Rank</th><th>Student</th><th>Attempts</th></tr></thead>
            <tbody id="mostActiveBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/admin-common.js"></script>
<script src="js/admin-leaderboard.js"></script>
</body>
</html>
